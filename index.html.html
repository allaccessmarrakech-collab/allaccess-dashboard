<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="All Access">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#070605">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Access Marrakech — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
    --gold-border: rgba(201,168,76,0.35);
    --bg: #070605;
    --bg2: #0d0b09;
    --bg3: #13100c;
    --text: #e8d5a0;
    --text-dim: rgba(232,213,160,0.5);
    --white: #ffffff;
    --red: #c0392b;
    --green: #27ae60;
    --orange: #e67e22;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--gold-border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--gold-border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .header-sub {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .header-date {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--gold-border);
    overflow-x: auto;
    padding: 0 16px;
  }

  .tab {
    padding: 14px 20px;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    font-weight: 400;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* ── MAIN ── */
  main { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

  .section { display: none; }
  .section.active { display: block; }

  /* ── STATS ROW ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--gold-border);
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .stat-label {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }

  .stat-sub {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* ── SECTION TITLE ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 1px;
  }

  /* ── BTN ── */
  .btn {
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    color: var(--gold);
    padding: 8px 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .btn:hover { background: rgba(201,168,76,0.25); }
  .btn.danger { border-color: rgba(192,57,43,0.4); color: #e74c3c; background: rgba(192,57,43,0.1); }
  .btn.success { border-color: rgba(39,174,96,0.4); color: #2ecc71; background: rgba(39,174,96,0.1); }
  .btn.sm { padding: 5px 10px; font-size: 8px; }

  /* ── FORM ── */
  .form-card {
    background: var(--bg2);
    border: 1px solid var(--gold-border);
    padding: 20px;
    margin-bottom: 20px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }

  label {
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  input, select, textarea {
    background: var(--bg3);
    border: 1px solid var(--gold-border);
    color: var(--text);
    padding: 10px 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
  }

  select option { background: var(--bg3); }

  /* ── LIST ── */
  .list { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--bg2);
    border: 1px solid var(--gold-border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: var(--gold); }

  .list-item-status {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .list-item-main { flex: 1; min-width: 0; }

  .list-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .list-item-meta {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .list-item-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    font-weight: 600;
    text-align: right;
    flex-shrink: 0;
  }

  .list-item-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  /* Status colors */
  .status-pending { background: var(--orange); }
  .status-confirmed { background: var(--green); }
  .status-done { background: #3498db; }
  .status-cancelled { background: var(--red); }

  /* Badge */
  .badge {
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    font-weight: 500;
  }

  .badge-pending { background: rgba(230,126,34,0.2); color: #e67e22; border: 1px solid rgba(230,126,34,0.3); }
  .badge-confirmed { background: rgba(39,174,96,0.2); color: #2ecc71; border: 1px solid rgba(39,174,96,0.3); }
  .badge-done { background: rgba(52,152,219,0.2); color: #3498db; border: 1px solid rgba(52,152,219,0.3); }
  .badge-cancelled { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
  .badge-unpaid { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
  .badge-paid { background: rgba(39,174,96,0.2); color: #2ecc71; border: 1px solid rgba(39,174,96,0.3); }

  /* ── REMINDER ALERT ── */
  .alert-box {
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--gold-border);
    border-left: 3px solid var(--gold);
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .alert-icon { font-size: 18px; flex-shrink: 0; }
  .alert-text { flex: 1; }
  .alert-title { font-size: 12px; color: var(--text); font-weight: 500; }
  .alert-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  .alert-urgent {
    background: rgba(192,57,43,0.08);
    border-color: rgba(192,57,43,0.4);
    border-left-color: #e74c3c;
  }

  /* ── GOLD SEPARATOR ── */
  .gold-sep {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px 0;
  }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px dashed var(--gold-border);
  }

  /* ── MODAL ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--gold-border);
    width: 100%;
    max-width: 480px;
    padding: 24px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--gold-border); }
</style>
</head>

  </div>

  <div class="section" id="sec-commissions">

    </div>

<!-- ══ MODALS ══ -->

<!-- Réservation -->
<div class="modal-bg" id="resaModal">
  <div class="modal">
    <div class="modal-title">Nouvelle Réservation</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Client</label>
        <input type="text" id="r_client" placeholder="Nom du client">
      </div>
      <div class="form-group">
        <label>Partenaire</label>
        <select id="r_partenaire"><option value="">— Choisir —</option></select>
      </div>
      <div class="form-group">
        <label>Service</label>
        <input type="text" id="r_service" placeholder="Villa, voiture, activité...">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="r_date">
      </div>
      <div class="form-group">
        <label>Montant (MAD)</label>
        <input type="number" id="r_montant" placeholder="0">
      </div>
      <div class="form-group">
        <label>Commission (MAD)</label>
        <input type="number" id="r_commission" placeholder="0">
      </div>
      <div class="form-group">
        <label>Statut</label>
        <select id="r_statut">
          <option value="pending">En attente</option>
          <option value="confirmed">Confirmé</option>
          <option value="done">Terminé</option>
          <option value="cancelled">Annulé</option>
        </select>
      </div>
      <div class="form-group">
        <label>Paiement</label>
        <select id="r_paiement">
          <option value="unpaid">Non payé</option>
          <option value="paid">Payé</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="r_notes" rows="2" placeholder="Informations supplémentaires..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="closeModal('resaModal')">Annuler</button>
      <button class="btn success" onclick="saveResa()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Commission -->
<div class="modal-bg" id="commModal">
  <div class="modal">
    <div class="modal-title">Commission à récupérer</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Partenaire</label>
        <select id="c_partenaire"><option value="">— Choisir —</option></select>
      </div>
      <div class="form-group">
        <label>Montant (MAD)</label>
        <input type="number" id="c_montant" placeholder="0">
      </div>
      <div class="form-group">
        <label>Référence / Client</label>
        <input type="text" id="c_ref" placeholder="Référence réservation">
      </div>
      <div class="form-group">
        <label>Date échéance</label>
        <input type="date" id="c_date">
      </div>
      <div class="form-group full">
        <label>Statut</label>
        <select id="c_statut">
          <option value="unpaid">À récupérer</option>
          <option value="paid">Récupérée</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="closeModal('commModal')">Annuler</button>
      <button class="btn success" onclick="saveComm()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Rappel -->
<div class="modal-bg" id="rappelModal">
  <div class="modal">
    <div class="modal-title">Nouveau Rappel</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Titre</label>
        <input type="text" id="rap_titre" placeholder="Rappel call client, relance commission...">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="rap_date">
      </div>
      <div class="form-group">
        <label>Priorité</label>
        <select id="rap_prio">
          <option value="normal">Normale</option>
          <option value="urgent">Urgente</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="rap_notes" rows="2" placeholder="Détails..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="closeModal('rappelModal')">Annuler</button>
      <button class="btn success" onclick="saveRappel()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Partenaire -->
<div class="modal-bg" id="partModal">
  <div class="modal">
    <div class="modal-title">Nouveau Partenaire</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="p_nom" placeholder="Noto, Leone, Villa Atlas...">
      </div>
      <div class="form-group">
        <label>Catégorie</label>
        <select id="p_cat">
          <option value="Restaurant">Restaurant</option>
          <option value="Nightlife">Nightlife</option>
          <option value="Villa">Villa</option>
          <option value="Transport">Transport</option>
          <option value="Activité">Activité</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Contact</label>
        <input type="text" id="p_contact" placeholder="+212...">
      </div>
      <div class="form-group">
        <label>Commission %</label>
        <input type="number" id="p_comm" placeholder="10">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="closeModal('partModal')">Annuler</button>
      <button class="btn success" onclick="savePart()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──
let data = JSON.parse(localStorage.getItem('aa_data') || '{"reservations":[],"commissions":[],"rappels":[],"partenaires":[]}');

function save() {
  localStorage.setItem('aa_data', JSON.stringify(data));
  render();
}

// ── UTILS ──
const statusLabel = { pending:'En attente', confirmed:'Confirmé', done:'Terminé', cancelled:'Annulé', unpaid:'Non payé', paid:'Payé' };
const today = new Date().toISOString().split('T')[0];

function formatDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function isToday(d) { return d === today; }
function isPast(d) { return d && d < today; }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── TABS ──
function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  event.target.classList.add('active');
  render();
}

// ── MODALS ──
function openModal(id) {
  // refresh partenaires selects
  ['r_partenaire','c_partenaire'].forEach(sel => {
    const el = document.getElementById(sel);
    if (!el) return;
    el.innerHTML = '<option value="">— Choisir —</option>';
    data.partenaires.forEach(p => {
      el.innerHTML += `<option value="${p.nom}">${p.nom}</option>`;
    });
  });
  document.getElementById(id).classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if(e.target === m) m.classList.remove('open'); });
});

// ── SAVE ──
function saveResa() {
  const r = {
    id: uid(),
    client: document.getElementById('r_client').value,
    partenaire: document.getElementById('r_partenaire').value,
    service: document.getElementById('r_service').value,
    date: document.getElementById('r_date').value,
    montant: +document.getElementById('r_montant').value || 0,
    commission: +document.getElementById('r_commission').value || 0,
    statut: document.getElementById('r_statut').value,
    paiement: document.getElementById('r_paiement').value,
    notes: document.getElementById('r_notes').value,
    createdAt: today
  };
  if (!r.client) return alert('Ajoute le nom du client');
  data.reservations.unshift(r);
  save();
  closeModal('resaModal');
  ['r_client','r_service','r_montant','r_commission','r_notes'].forEach(id => document.getElementById(id).value = '');
}

function saveComm() {
  const c = {
    id: uid(),
    partenaire: document.getElementById('c_partenaire').value,
    montant: +document.getElementById('c_montant').value || 0,
    ref: document.getElementById('c_ref').value,
    date: document.getElementById('c_date').value,
    statut: document.getElementById('c_statut').value,
    createdAt: today
  };
  data.commissions.unshift(c);
  save();
  closeModal('commModal');
}

function saveRappel() {
  const r = {
    id: uid(),
    titre: document.getElementById('rap_titre').value,
    date: document.getElementById('rap_date').value,
    prio: document.getElementById('rap_prio').value,
    notes: document.getElementById('rap_notes').value,
    done: false,
    createdAt: today
  };
  if (!r.titre) return alert('Ajoute un titre');
  data.rappels.unshift(r);
  save();
  closeModal('rappelModal');
}

function savePart() {
  const p = {
    id: uid(),
    nom: document.getElementById('p_nom').value,
    cat: document.getElementById('p_cat').value,
    contact: document.getElementById('p_contact').value,
    comm: +document.getElementById('p_comm').value || 0
  };
  if (!p.nom) return alert('Ajoute le nom');
  data.partenaires.unshift(p);
  save();
  closeModal('partModal');
}

// ── DELETE / STATUS ──
function delResa(id) { if(confirm('Supprimer ?')) { data.reservations = data.reservations.filter(r=>r.id!==id); save(); } }
function delComm(id) { if(confirm('Supprimer ?')) { data.commissions = data.commissions.filter(c=>c.id!==id); save(); } }
function delRappel(id) { data.rappels = data.rappels.filter(r=>r.id!==id); save(); }
function delPart(id) { if(confirm('Supprimer ?')) { data.partenaires = data.partenaires.filter(p=>p.id!==id); save(); } }

function toggleComm(id) {
  const c = data.commissions.find(c=>c.id===id);
  if (c) { c.statut = c.statut === 'paid' ? 'unpaid' : 'paid'; save(); }
}

function toggleRappel(id) {
  const r = data.rappels.find(r=>r.id===id);
  if (r) { r.done = !r.done; save(); }
}

function setResaStatut(id, val) {
  const r = data.reservations.find(r=>r.id===id);
  if (r) { r.statut = val; if(val==='done') r.paiement='paid'; save(); }
}

// ── RENDER ──
function render() {
  renderDashboard();
  renderResa();
  renderComm();
  renderRappels();
  renderPart();
}

function renderDashboard() {
  // Stats
  const totalResa = data.reservations.filter(r=>r.statut!=='cancelled').length;
  const commARecup = data.commissions.filter(c=>c.statut==='unpaid').reduce((a,c)=>a+c.montant,0);
  const caTotal = data.reservations.filter(r=>r.paiement==='paid').reduce((a,r)=>a+r.montant,0);
  const rappelsUrgents = data.rappels.filter(r=>!r.done && (isPast(r.date)||isToday(r.date))).length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Réservations actives</div>
      <div class="stat-value">${totalResa}</div>
      <div class="stat-sub">${data.reservations.filter(r=>r.statut==='confirmed').length} confirmées</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Commissions à récup</div>
      <div class="stat-value" style="color:#e74c3c">${commARecup.toLocaleString()}</div>
      <div class="stat-sub">MAD · ${data.commissions.filter(c=>c.statut==='unpaid').length} en attente</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">CA encaissé</div>
      <div class="stat-value">${caTotal.toLocaleString()}</div>
      <div class="stat-sub">MAD · total payé</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Rappels urgents</div>
      <div class="stat-value" style="color:${rappelsUrgents>0?'#e67e22':'#2ecc71'}">${rappelsUrgents}</div>
      <div class="stat-sub">aujourd'hui ou dépassés</div>
    </div>
  `;

  // Alerts
  const alertsEl = document.getElementById('dashAlerts');
  const todayRappels = data.rappels.filter(r=>!r.done && (isToday(r.date)||isPast(r.date)));
  const commDues = data.commissions.filter(c=>c.statut==='unpaid' && (isToday(c.date)||isPast(c.date)));

  let html = '';
  todayRappels.forEach(r => {
    const urgent = r.prio==='urgent' || isPast(r.date);
    html += `<div class="alert-box ${urgent?'alert-urgent':''}">
      <div class="alert-icon">${urgent?'🚨':'🔔'}</div>
      <div class="alert-text">
        <div class="alert-title">${r.titre}</div>
        <div class="alert-sub">${r.notes||''} · ${formatDate(r.date)}</div>
      </div>
      <button class="btn sm success" onclick="toggleRappel('${r.id}')">✓ Fait</button>
    </div>`;
  });
  commDues.forEach(c => {
    html += `<div class="alert-box alert-urgent">
      <div class="alert-icon">💰</div>
      <div class="alert-text">
        <div class="alert-title">Commission à récupérer — ${c.partenaire||'?'}</div>
        <div class="alert-sub">${c.ref||''} · ${c.montant.toLocaleString()} MAD · Échéance ${formatDate(c.date)}</div>
      </div>
      <button class="btn sm success" onclick="toggleComm('${c.id}')">✓ Récupérée</button>
    </div>`;
  });

  alertsEl.innerHTML = html || '<div class="empty">Aucun rappel pour aujourd\'hui 🎉</div>';

  // Last reservations
  const last = data.reservations.slice(0,5);
  document.getElementById('dashReservations').innerHTML = last.length ? last.map(r => resaItem(r)).join('') : '<div class="empty">Aucune réservation</div>';
}

function resaItem(r) {
  return `<div class="list-item">
    <div class="list-item-status status-${r.statut}"></div>
    <div class="list-item-main">
      <div class="list-item-name">${r.client}</div>
      <div class="list-item-meta">${r.partenaire||'—'} · ${r.service||'—'} · ${formatDate(r.date)}</div>
      <div style="margin-top:4px;display:flex;gap:6px;">
        <span class="badge badge-${r.statut}">${statusLabel[r.statut]}</span>
        <span class="badge badge-${r.paiement}">${statusLabel[r.paiement]}</span>
      </div>
    </div>
    <div>
      <div class="list-item-amount">${r.montant.toLocaleString()} MAD</div>
      ${r.commission ? `<div style="font-size:10px;color:var(--gold);text-align:right">Comm: ${r.commission.toLocaleString()}</div>` : ''}
    </div>
    <div class="list-item-actions">
      <select onchange="setResaStatut('${r.id}',this.value)" style="font-size:9px;padding:4px 6px;width:90px">
        <option value="pending" ${r.statut==='pending'?'selected':''}>En attente</option>
        <option value="confirmed" ${r.statut==='confirmed'?'selected':''}>Confirmé</option>
        <option value="done" ${r.statut==='done'?'selected':''}>Terminé</option>
        <option value="cancelled" ${r.statut==='cancelled'?'selected':''}>Annulé</option>
      </select>
      <button class="btn sm danger" onclick="delResa('${r.id}')">✕</button>
    </div>
  </div>`;
}

function renderResa() {
  document.getElementById('resaList').innerHTML = data.reservations.length
    ? data.reservations.map(r => resaItem(r)).join('')
    : '<div class="empty">Aucune réservation · Ajoute la première</div>';
}

function renderComm() {
  document.getElementById('commList').innerHTML = data.commissions.length
    ? data.commissions.map(c => `
      <div class="list-item">
        <div class="list-item-status ${c.statut==='paid'?'status-done':'status-pending'}"></div>
        <div class="list-item-main">
          <div class="list-item-name">${c.partenaire||'Partenaire'}</div>
          <div class="list-item-meta">${c.ref||'—'} · Échéance ${formatDate(c.date)}</div>
          <span class="badge badge-${c.statut}" style="margin-top:4px;display:inline-block">${c.statut==='paid'?'Récupérée':'À récupérer'}</span>
        </div>
        <div class="list-item-amount">${c.montant.toLocaleString()} MAD</div>
        <div class="list-item-actions">
          <button class="btn sm ${c.statut==='paid'?'danger':'success'}" onclick="toggleComm('${c.id}')">${c.statut==='paid'?'↩ Annuler':'✓ Récup.'}</button>
          <button class="btn sm danger" onclick="delComm('${c.id}')">✕</button>
        </div>
      </div>`).join('')
    : '<div class="empty">Aucune commission · Ajoute la première</div>';
}

function renderRappels() {
  const sorted = [...data.rappels].sort((a,b)=>(a.done?1:-1)+(a.date<b.date?-1:1));
  document.getElementById('rappelList').innerHTML = sorted.length
    ? sorted.map(r => `
      <div class="list-item" style="${r.done?'opacity:0.45':''}">
        <div class="list-item-status ${r.done?'status-done':r.prio==='urgent'?'status-pending':'status-confirmed'}"></div>
        <div class="list-item-main">
          <div class="list-item-name" style="${r.done?'text-decoration:line-through':''}">${r.titre}</div>
          <div class="list-item-meta">${r.notes||''} · ${formatDate(r.date)} ${r.prio==='urgent'?'· 🚨 URGENT':''}</div>
        </div>
        <div class="list-item-actions">
          <button class="btn sm ${r.done?'danger':'success'}" onclick="toggleRappel('${r.id}')">${r.done?'↩':'✓ Fait'}</button>
          <button class="btn sm danger" onclick="delRappel('${r.id}')">✕</button>
        </div>
      </div>`).join('')
    : '<div class="empty">Aucun rappel · Ajoute le premier</div>';
}

function renderPart() {
  document.getElementById('partList').innerHTML = data.partenaires.length
    ? data.partenaires.map(p => `
      <div class="list-item">
        <div class="list-item-status status-confirmed"></div>
        <div class="list-item-main">
          <div class="list-item-name">${p.nom}</div>
          <div class="list-item-meta">${p.cat} · ${p.contact||'—'}</div>
        </div>
        <div style="color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600">${p.comm}%</div>
        <div class="list-item-actions">
          <button class="btn sm danger" onclick="delPart('${p.id}')">✕</button>
        </div>
      </div>`).join('')
    : '<div class="empty">Aucun partenaire · Ajoute le premier</div>';
}

// ── INIT ──
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
render();
</script>
</body>
</html>
